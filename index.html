<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Nicole & Willamis | 03.07.2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
  color-scheme: light only;
    --cream:#f7f1ea;
    --paper:#faf5ef;
    --wine:#5e0f1c;
    --wine-2:#7a1a29;
    --wine-dark:#33070f;
    --wine-darker:#210409;
    --gold:#c8a15a;
    --gold-light:#e9d6ab;
    --rose-deep:#5c0f18;
    --rose-mid:#8a1c28;
    --rose-bright:#b3283a;
    --leaf:#4b5842;
    --ink:#4a2a2f;
  }
  html{
    color-scheme: light only;
  }
  
  *{box-sizing:border-box;}

  body{
    color-scheme: light only;
    margin:0;
    min-height:100vh;
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start; 
    background:
      radial-gradient(circle at 50% 20%, #fbf6f0 0%, var(--cream) 55%, #ece1d5 100%);
    font-family:'Cormorant Garamond', serif;
    overflow-y:auto; 
    overflow-x:hidden;
    position:relative;
  }
  
  /* soft ambient vignette */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(51,7,15,0.12) 100%);
    pointer-events:none;
    z-index: 0;
  }

  .hint{
    position:fixed;
    bottom:34px;
    left:50%;
    transform:translateX(-50%);
    color:var(--wine-2);
    font-size:15px;
    letter-spacing:3px;
    text-transform:uppercase;
    font-family:'Cormorant Garamond', serif;
    opacity:0.55;
    animation:pulseHint 2.6s ease-in-out infinite;
    transition:opacity 0.4s;
    z-index:100;
  }
  @keyframes pulseHint{
    0%,100%{opacity:0.35;}
    50%{opacity:0.75;}
  }

  .scale-container{
    transform:scale(1);
    margin-top: clamp(340px, 40vh, 500px);
    margin-bottom: 200px;
  }

  .envelope-wrapper{
    position:relative;
    width:640px;
    height:430px;
  }

  #open-envelope, #flip-card {display:none;}

  /* ============ ENVELOPE ============ */
  .envelope{
    position:relative;
    width:100%;
    height:100%;
    border-radius:4px;
    background:
      linear-gradient(135deg, var(--wine-2) 0%, var(--wine) 45%, var(--wine-dark) 100%);
    box-shadow:
      0 45px 80px rgba(20,3,7,0.45),
      0 10px 25px rgba(20,3,7,0.3);
  }

  /* faint linen texture */
  .envelope::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 6px);
    border-radius:4px;
    pointer-events:none;
  }

  /* gold foil border frame */
  .foil-frame{
    position:absolute;
    inset:10px;
    border:1px solid var(--gold);
    border-radius:2px;
    opacity:0.55;
    z-index:1;
    pointer-events:none;
  }
  .front-left{
    position:absolute; inset:0;
    background:linear-gradient(120deg, var(--wine-dark), var(--wine));
    clip-path:polygon(0 0, 54% 50%, 0 100%);
    z-index:3;
  }
  .front-right{
    position:absolute; inset:0;
    background:linear-gradient(240deg, var(--wine-dark), var(--wine));
    clip-path:polygon(100% 0, 46% 50%, 100% 100%);
    z-index:3;
  }
  .front-bottom{
    position:absolute; inset:0;
    background:linear-gradient(0deg, var(--wine-darker), var(--wine-dark));
    clip-path:polygon(0 100%, 50% 46%, 100% 100%);
    z-index:3;
  }

  .flap{
    position:absolute; inset:0;
    background:linear-gradient(160deg, var(--wine-2), var(--wine-dark));
    clip-path:polygon(0 0, 100% 0, 50% 54%);
    z-index:5;
    transform-origin:top;
    transition:transform 0.85s cubic-bezier(.4,0,.2,1);
    border-bottom:1px solid rgba(200,161,90,0.4);
  }
  .flap::after{
    content:"";
    position:absolute;
    inset:0;
    clip-path:polygon(0 0, 100% 0, 50% 54%);
    background:repeating-linear-gradient(100deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 7px);
  }

  /* light grey ribbon, ends gathered at the seal */
  .ribbon{
    position:absolute;
    top:0; bottom:0;
    left:50%;
    width:64px;
    margin-left:-32px;
    background:linear-gradient(to right, #c9c9c9, #f2f2f2 30%, #ffffff 50%, #f2f2f2 70%, #c9c9c9);
    box-shadow:3px 0 10px rgba(0,0,0,0.28), -3px 0 8px rgba(0,0,0,0.12);
    z-index:6;
    transition:opacity 0.4s, transform 0.4s;
  }
  .ribbon::before{
    content:"";
    position:absolute;
    left:0; right:0; top:50%;
    height:1px;
    background:rgba(0,0,0,0.06);
  }

  .sprig{
    position:absolute;
    top:53%; left:47%;
    width: 130px; 
    height: 210px;
    margin: -155px 0 0 -45px;
    z-index:6;
    pointer-events:none;
    transform:rotate(-32deg);
    transform-origin:70% 85%;
    transition:opacity 0.4s, transform 0.4s;
  }
  .sprig img{
    width:100%;
    height:100%;
    object-fit:contain;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,0.35));
  }

  .seal{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:100px; height:100px;
    border-radius:50%;
    background:radial-gradient(circle at 32% 28%, #8a2530, var(--rose-deep) 60%, #3b0e14 100%);
    z-index:7;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:
      0 10px 18px rgba(0,0,0,0.5),
      inset 0 0 10px rgba(255,255,255,0.15),
      inset 0 -6px 10px rgba(0,0,0,0.35);
    transition:opacity 0.4s, transform 0.4s;
  }
  .seal::before{
    content:"";
    position:absolute;
    inset:-6px;
    border-radius:50%;
    border:1px dashed rgba(233,214,171,0.5);
  }
  .seal img{
    width:66%;
    height:66%;
    object-fit:contain;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,0.4));
  }

  /* ============ CARD (container 3D) ============ */
  .card {
    position: absolute;
    width: 560px;
    top: 14px;
    left: 40px;
    z-index: 2;
    line-height: 0;
    transition: transform 0.9s cubic-bezier(.4,0,.2,1);
    perspective: 1500px; /* Cria o espaço 3D para o efeito de virar */
  }

  /* Miolo do cartão que vai rotacionar */
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.8s cubic-bezier(.4,0,.2,1);
    transform-style: preserve-3d;
    box-shadow: 0 30px 60px rgba(20,3,7,0.4);
    border-radius: 2px;
  }

  /* Faces do papel (frente e verso) */
  .card-front, .card-back {
    position: relative;
    width: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--paper);
    border: 1px solid var(--gold);
    outline: 1px solid rgba(200,161,90,0.35);
    outline-offset: 4px;
    border-radius: 2px;
  }

  .card-front {
    z-index: 2;
    transform: rotateY(0deg); 
  }

  .card-back {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    transform: rotateY(180deg); /* Já começa virado de costas */
  }

  .card-front img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 2px;
  }

  .card-back img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 2px;
  }

  /* ============ close/back button ============ */
  .close-btn{
    position:absolute;
    top:15px;
    left:15px;
    z-index:10;
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 14px;
    font-size:13px;
    letter-spacing:1px;
    background:linear-gradient(135deg, var(--wine-2), var(--wine-dark));
    color:var(--gold-light);
    border:1px solid var(--gold);
    border-radius:30px;
    font-family:'Cormorant Garamond', serif;
    text-transform:uppercase;
    text-decoration:none;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(20,3,7,0.3);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.5s ease 0.3s, transform 0.3s ease;
    white-space:nowrap;
  }
  
  .close-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(20,3,7,0.4);
  }
  
  .close-btn svg{
    width:12px; 
    height:12px;
  }

  /* ============ Botão de Virar o Cartão ============ */
  .flip-btn {
    position: absolute;
    top: 15px;
    right: 15px; /* Canto superior direito */
    z-index: 10;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    background: linear-gradient(135deg, var(--wine-2), var(--wine-dark));
    color: var(--gold-light);
    border: 1px solid var(--gold);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(20,3,7,0.3);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease 0.3s, transform 0.3s ease, background 0.3s ease;
  }

  .flip-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(20,3,7,0.4);
    background: var(--rose-bright);
  }

  .flip-btn svg { width: 18px; height: 18px; stroke: currentColor; }

  /* ============ Botões Interativos Circulares ============ */
  .rsvp-btn, .location-btn, .gift-btn {
    position: absolute;
    top: 63.5%; 
    transform: translate(-50%, -50%);
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 42px; 
    height: 42px;
    background-color: #691621;
    border-radius: 50%;
    text-decoration: none;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease 0.3s, transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
  }

  .rsvp-btn { left: 39.5%; }
  .location-btn { left: 50%; }
  .gift-btn { left: 60.5%; }

  .rsvp-btn:hover, .location-btn:hover, .gift-btn:hover {
    background-color: var(--rose-bright);
    transform: translate(-50%, -50%) scale(1.1);
    box-shadow: 0 4px 12px rgba(94, 15, 28, 0.4);
  }

  .rsvp-btn svg, .location-btn svg, .gift-btn svg { width: 20px; height: 20px; }

  /* ============ open state ============ */
  #open-envelope:checked ~ .envelope .flap{
    transform:rotateX(180deg);
    z-index:1;
  }
  #open-envelope:checked ~ .envelope .ribbon{
    opacity:0;
    transform:translateY(-40px);
    pointer-events:none;
  }
  #open-envelope:checked ~ .envelope .sprig{
    opacity:0;
    transform:rotate(-32deg) translateY(-30px);
    pointer-events:none;
  }
  #open-envelope:checked ~ .envelope .seal{
    opacity:0;
    transform:translate(-50%,-90px) scale(0.9);
    pointer-events:none;
  }
  #open-envelope:checked ~ .envelope .card{
    transform:translateY(-330px) scale(1.03);
  }
  #open-envelope:checked ~ .envelope .card .card-inner{
    box-shadow:0 55px 90px rgba(20,3,7,0.5);
  }
  
  /* Ação de virar o cartão quando o flip-card estiver checado */
  #flip-card:checked ~ .envelope .card .card-inner {
    transform: rotateY(180deg);
  }

  #open-envelope:checked ~ .envelope .close-btn,
  #open-envelope:checked ~ .envelope .rsvp-btn,
  #open-envelope:checked ~ .envelope .location-btn,
  #open-envelope:checked ~ .envelope .gift-btn,
  #open-envelope:checked ~ .envelope .flip-btn {
    opacity:1;
    pointer-events:auto;
  }
  #open-envelope:checked ~ .hint{
    opacity:0;
  }

  /* ============ responsive ============ */
  @media (max-width:900px){
    .scale-container{
      transform:scale(0.72);
      margin-top: clamp(250px, 35vh, 400px);
    }
  }
  @media (max-width:640px){
    .scale-container{
      transform:scale(0.5);
      margin-top: clamp(180px, 25vh, 300px);
    }
  }
  @media (max-width:420px){
    .scale-container{
      transform:scale(0.4);
      margin-top: clamp(140px, 20vh, 250px);
    }
  }
</style>
</head>
<body>

  <div class="scale-container">
    <div class="envelope-wrapper">
      
      <!-- Checkbox de abrir envelope -->
      <input type="checkbox" id="open-envelope">
      <!-- NOVO: Checkbox para controlar a rotação 3D do papel -->
      <input type="checkbox" id="flip-card">

      <div class="envelope">
        <div class="foil-frame"></div>
        <div class="front-left"></div>
        <div class="front-right"></div>
        <div class="front-bottom"></div>

        <div class="flap"></div>

        <div class="ribbon"></div>

        <div class="sprig">
          <img src="sprig-single.png" alt="">
        </div>

        <label for="open-envelope" class="seal">
          <img src="seal-monogram-gold.png" alt="N&amp;W">
        </label>

        <!-- ======= INTERIOR CARD ======= -->
        <div class="card">
          <!-- Wrapper 3D -->
          <div class="card-inner">
            
            <!-- FRENTE DO CONVITE -->
            <div class="card-front">
              <label for="open-envelope" class="close-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
                Fechar
              </label>

              <!-- Botão para virar para o verso -->
              <label for="flip-card" class="flip-btn" title="Ver Orientações">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="1 4 1 10 7 10"></polyline>
                  <polyline points="23 20 23 14 17 14"></polyline>
                  <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10"></path>
                  <path d="M3.51 15A9 9 0 0 0 18.36 18.36L23 14"></path>
                </svg>
              </label>

              <img src="convite.jpg" alt="Convite de casamento de Nicole e Willamis">

              <a href="https://wa.me/5574999518878?text=Olá! Gostaria de confirmar minha presença no casamento de Nicole e Willamis no dia 03.07.2027!" target="_blank" class="rsvp-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              </a>

              <a href="https://www.google.com/maps/dir/?api=1&origin=Paróquia+Santa+Lúcia,+Jabotiana,+Aracaju+-+SE&destination=Feast+House,+Jabotiana,+Aracaju+-+SE" target="_blank" class="location-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
              </a>

              <a href="#" target="_blank" class="gift-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 12 20 22 4 22 4 12"></polyline>
                  <rect x="2" y="7" width="20" height="5"></rect>
                  <line x1="12" y1="22" x2="12" y2="7"></line>
                  <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
                  <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
                </svg>
              </a>
            </div>

            <!-- VERSO DO CONVITE -->
            <div class="card-back">
              <!-- Botão para voltar para a frente -->
              <label for="flip-card" class="flip-btn" title="Voltar ao Convite">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="1 4 1 10 7 10"></polyline>
                  <polyline points="23 20 23 14 17 14"></polyline>
                  <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10"></path>
                  <path d="M3.51 15A9 9 0 0 0 18.36 18.36L23 14"></path>
                </svg>
              </label>
              
              <img src="Teste (1).jpg" alt="Orientações do Casamento">
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="hint">Toque no lacre para abrir</div>

</body>
</html>
