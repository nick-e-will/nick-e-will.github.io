<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicole & Willamis | 03.07.2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f7f1ea;
    --paper:#faf5ef;
    --wine:#5e0f1c;
    --wine-2:#7a1a29;
    --wine-dark:#33070f;
    --wine-darker:#210409;
    --gold:#c8a15a;
    --gold-light:#e9d6ab;
    --rose-deep:#5c0f18;
    --rose-mid:#8a1c28;
    --rose-bright:#b3283a;
    --leaf:#4b5842;
    --ink:#4a2a2f;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
      radial-gradient(circle at 50% 20%, #fbf6f0 0%, var(--cream) 55%, #ece1d5 100%);
    font-family:'Cormorant Garamond', serif;
    overflow:hidden;
    position:relative;
  }

  /* soft ambient vignette */
  body::before{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(51,7,15,0.12) 100%);
    pointer-events:none;
  }

  .hint{
    position:absolute;
    bottom:34px;
    left:50%;
    transform:translateX(-50%);
    color:var(--wine-2);
    font-size:15px;
    letter-spacing:3px;
    text-transform:uppercase;
    font-family:'Cormorant Garamond', serif;
    opacity:0.55;
    animation:pulseHint 2.6s ease-in-out infinite;
  }
  @keyframes pulseHint{
    0%,100%{opacity:0.35;}
    50%{opacity:0.75;}
  }

  .scale-container{transform:scale(1);}

  .envelope-wrapper{
    position:relative;
    width:640px;
    height:430px;
  }

  #open-envelope{display:none;}

  /* ============ ENVELOPE ============ */
  .envelope{
    position:relative;
    width:100%;
    height:100%;
    border-radius:4px;
    background:
      linear-gradient(135deg, var(--wine-2) 0%, var(--wine) 45%, var(--wine-dark) 100%);
    box-shadow:
      0 45px 80px rgba(20,3,7,0.45),
      0 10px 25px rgba(20,3,7,0.3);
  }

  /* faint linen texture */
  .envelope::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 6px);
    border-radius:4px;
    pointer-events:none;
  }

  /* gold foil border frame */
  .foil-frame{
    position:absolute;
    inset:10px;
    border:1px solid var(--gold);
    border-radius:2px;
    opacity:0.55;
    z-index:2;
    pointer-events:none;
  }

  .front-left{
    position:absolute; inset:0;
    background:linear-gradient(120deg, var(--wine-dark), var(--wine));
    clip-path:polygon(0 0, 54% 50%, 0 100%);
    z-index:3;
  }
  .front-right{
    position:absolute; inset:0;
    background:linear-gradient(240deg, var(--wine-dark), var(--wine));
    clip-path:polygon(100% 0, 46% 50%, 100% 100%);
    z-index:3;
  }
  .front-bottom{
    position:absolute; inset:0;
    background:linear-gradient(0deg, var(--wine-darker), var(--wine-dark));
    clip-path:polygon(0 100%, 50% 46%, 100% 100%);
    z-index:3;
  }

  /* thin gold seams on the triangular folds */
  .seam{
    position:absolute; inset:0;
    z-index:4;
    pointer-events:none;
  }
  .seam svg{width:100%; height:100%;}

  .flap{
    position:absolute; inset:0;
    background:linear-gradient(160deg, var(--wine-2), var(--wine-dark));
    clip-path:polygon(0 0, 100% 0, 50% 54%);
    z-index:5;
    transform-origin:top;
    transition:transform 0.85s cubic-bezier(.4,0,.2,1);
    border-bottom:1px solid rgba(200,161,90,0.4);
  }
  .flap::after{
    content:"";
    position:absolute;
    inset:0;
    clip-path:polygon(0 0, 100% 0, 50% 54%);
    background:repeating-linear-gradient(100deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 7px);
  }

  /* gold ribbons crossing in an X */
  .ribbon{
    position:absolute;
    top:50%; left:50%;
    width:520px; height:26px;
    margin:-13px 0 0 -260px;
    background:linear-gradient(to bottom, #a9813f, var(--gold-light) 45%, var(--gold) 55%, #a9813f);
    box-shadow:0 3px 8px rgba(0,0,0,0.35);
    z-index:6;
    transition:opacity 0.4s, transform 0.4s;
  }
  .ribbon.r1{ transform:rotate(32deg); }
  .ribbon.r2{ transform:rotate(-32deg); }

  /* dried sprig under the seal */
  .sprig{
    position:absolute;
    top:50%; left:50%;
    width:150px; height:150px;
    margin:-75px 0 0 -75px;
    z-index:6;
    pointer-events:none;
    transition:opacity 0.4s, transform 0.4s;
  }

  .seal{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:100px; height:100px;
    border-radius:50%;
    background:radial-gradient(circle at 32% 28%, #8a2530, var(--rose-deep) 60%, #3b0e14 100%);
    z-index:7;
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--gold-light);
    font-family:'Parisienne', cursive;
    font-size:34px;
    cursor:pointer;
    box-shadow:
      0 10px 18px rgba(0,0,0,0.5),
      inset 0 0 10px rgba(255,255,255,0.15),
      inset 0 -6px 10px rgba(0,0,0,0.35);
    transition:opacity 0.4s, transform 0.4s;
  }
  .seal::before{
    content:"";
    position:absolute;
    inset:-6px;
    border-radius:50%;
    border:1px dashed rgba(233,214,171,0.5);
  }

  /* ============ CARD (interior) ============ */
  .card{
    position:absolute;
    width:560px;
    min-height:400px;
    top:14px;
    left:40px;
    z-index:1;
    background:var(--paper);
    border:1px solid var(--gold);
    outline:1px solid rgba(200,161,90,0.35);
    outline-offset:4px;
    border-radius:2px;
    box-shadow:0 30px 60px rgba(20,3,7,0.4);
    padding:52px 44px 40px;
    text-align:center;
    overflow:hidden;
    transition:transform 0.9s cubic-bezier(.4,0,.2,1), box-shadow 0.9s;
  }

  .card-bg{
    position:absolute;
    top:0; left:50%;
    transform:translateX(-50%);
    width:420px;
    opacity:0.16;
    z-index:0;
    pointer-events:none;
  }

  .card-content{position:relative; z-index:2;}

  .monogram{
    font-family:'Parisienne', cursive;
    font-size:40px;
    color:var(--gold);
    letter-spacing:2px;
    margin-bottom:6px;
    text-shadow:0 1px 0 rgba(255,255,255,0.6);
  }

  .cross{
    width:16px; height:22px;
    margin:0 auto 10px;
    opacity:0.8;
  }

  .names{
    font-family:'Parisienne', cursive;
    font-size:58px;
    color:var(--wine);
    margin:4px 0 18px;
    line-height:1.05;
  }

  .blessing{
    font-size:17px;
    color:var(--ink);
    font-style:italic;
    line-height:1.75;
    margin:0 auto 22px;
    max-width:380px;
    letter-spacing:0.3px;
  }
  .blessing span{display:block;}

  .icons-row{
    display:flex;
    justify-content:center;
    gap:26px;
    margin:6px 0 26px;
  }
  .icon-circle{
    width:52px; height:52px;
    border-radius:50%;
    background:radial-gradient(circle at 32% 28%, var(--rose-mid), var(--rose-deep));
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 6px 12px rgba(94,15,28,0.35), inset 0 -3px 6px rgba(0,0,0,0.25);
  }
  .icon-circle svg{width:22px; height:22px;}

  .divider{
    width:70px; height:1px;
    background:var(--gold);
    margin:0 auto 24px;
    opacity:0.7;
  }

  .date{
    font-family:'Parisienne', cursive;
    font-size:38px;
    color:var(--wine);
    margin-bottom:4px;
  }

  .time{
    font-size:19px;
    letter-spacing:4px;
    color:var(--ink);
    margin-bottom:20px;
  }

  .place{
    font-size:18px;
    color:var(--ink);
    line-height:2;
  }
  .place strong{
    color:var(--wine);
    font-weight:600;
  }

  .roses{
    position:absolute;
    bottom:-14px;
    width:150px;
    z-index:1;
    pointer-events:none;
  }
  .roses.left{ left:-24px; }
  .roses.right{ right:-24px; transform:scaleX(-1); }

  /* ============ open state ============ */
  #open-envelope:checked ~ .envelope .flap{
    transform:rotateX(180deg);
    z-index:1;
  }
  #open-envelope:checked ~ .envelope .ribbon,
  #open-envelope:checked ~ .envelope .sprig{
    opacity:0;
    transform:translateY(-30px) rotate(var(--rot,0deg));
    pointer-events:none;
  }
  #open-envelope:checked ~ .envelope .seal{
    opacity:0;
    transform:translate(-50%,-90px) scale(0.9);
    pointer-events:none;
  }
  #open-envelope:checked ~ .envelope .card{
    transform:translateY(-330px) scale(1.03);
    box-shadow:0 55px 90px rgba(20,3,7,0.5);
  }

  /* ============ responsive ============ */
  @media (max-width:900px){
    .scale-container{transform:scale(0.72);}
  }
  @media (max-width:640px){
    .scale-container{transform:scale(0.5);}
  }
  @media (max-width:420px){
    .scale-container{transform:scale(0.4);}
  }
</style>
</head>
<body>

  <div class="scale-container">
    <div class="envelope-wrapper">
      <input type="checkbox" id="open-envelope">

      <div class="envelope">
        <div class="foil-frame"></div>
        <div class="front-left"></div>
        <div class="front-right"></div>
        <div class="front-bottom"></div>

        <div class="flap"></div>

        <div class="ribbon r1" style="--rot:32deg"></div>
        <div class="ribbon r2" style="--rot:-32deg"></div>

        <div class="sprig">
          <svg viewBox="0 0 100 150" fill="none" stroke="#c8a15a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
            <path d="M50,140 Q40,90 60,30"/>
            <path d="M54,105 Q70,95 80,75"/>
            <path d="M47,75 Q30,65 20,45"/>
            <path d="M57,55 Q75,45 85,25"/>
            <circle cx="80" cy="75" r="3.5" fill="#c8a15a" stroke="none"/>
            <circle cx="20" cy="45" r="3" fill="#c8a15a" stroke="none"/>
            <circle cx="85" cy="25" r="3.5" fill="#c8a15a" stroke="none"/>
            <circle cx="60" cy="30" r="4" fill="#c8a15a" stroke="none"/>
          </svg>
        </div>

        <label for="open-envelope" class="seal">N&W</label>

        <!-- ======= INTERIOR CARD ======= -->
        <div class="card">

          <!-- faint church illustration -->
          <svg class="card-bg" viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#5e0f1c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <!-- cross -->
            <line x1="200" y1="18" x2="200" y2="55"/>
            <line x1="186" y1="30" x2="214" y2="30"/>
            <!-- rose window -->
            <circle cx="200" cy="95" r="26"/>
            <circle cx="200" cy="95" r="14"/>
            <line x1="200" y1="69" x2="200" y2="121"/>
            <line x1="174" y1="95" x2="226" y2="95"/>
            <line x1="182" y1="77" x2="218" y2="113"/>
            <line x1="218" y1="77" x2="182" y2="113"/>
            <!-- facade body -->
            <path d="M120 480 V 220 Q120 150 200 130 Q280 150 280 220 V 480"/>
            <!-- side pinnacle towers -->
            <path d="M92 480 V 260 L106 235 L120 260 V 480"/>
            <path d="M308 480 V 260 L294 235 L280 260 V 480"/>
            <!-- main arched door -->
            <path d="M172 480 V 360 Q172 320 200 320 Q228 320 228 360 V 480"/>
            <line x1="200" y1="330" x2="200" y2="480"/>
            <!-- side small arches -->
            <path d="M140 480 V 400 Q140 380 152 380 Q164 380 164 400 V 480"/>
            <path d="M236 480 V 400 Q236 380 248 380 Q260 380 260 400 V 480"/>
            <!-- steps -->
            <line x1="70" y1="480" x2="330" y2="480"/>
            <line x1="80" y1="492" x2="320" y2="492"/>
            <line x1="90" y1="504" x2="310" y2="504"/>
            <!-- roofline accents -->
            <line x1="150" y1="220" x2="250" y2="220"/>
          </svg>

          <div class="card-content">
            <div class="monogram">N &amp; W</div>

            <h1 class="names">Nicole &amp; Willamis</h1>

            <p class="blessing">
              <span>com a bênção de Deus e de seus pais</span>
              <span>convidam para a celebração do seu casamento</span>
            </p>

            <div class="icons-row">
              <div class="icon-circle" title="Confirme presença">
                <svg viewBox="0 0 24 24" fill="none" stroke="#e9d6ab" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="4,13 9,18 20,6"/>
                </svg>
              </div>
              <div class="icon-circle" title="Local">
                <svg viewBox="0 0 24 24" fill="none" stroke="#e9d6ab" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 21s7-7.2 7-12a7 7 0 1 0-14 0c0 4.8 7 12 7 12z"/>
                  <circle cx="12" cy="9" r="2.3"/>
                </svg>
              </div>
              <div class="icon-circle" title="Lista de presentes">
                <svg viewBox="0 0 24 24" fill="none" stroke="#e9d6ab" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="4" y="9" width="16" height="11" rx="1"/>
                  <line x1="4" y1="13" x2="20" y2="13"/>
                  <line x1="12" y1="9" x2="12" y2="20"/>
                  <path d="M12 9c-2-4-7-3-6 0.5C6.6 9.9 9 9 12 9z"/>
                  <path d="M12 9c2-4 7-3 6 0.5C17.4 9.9 15 9 12 9z"/>
                </svg>
              </div>
            </div>

            <div class="date">03 de Julho de 2027</div>
            <div class="time">18H00</div>

            <div class="divider"></div>

            <div class="place">
              <strong>Cerimônia:</strong> Paróquia Santa Lúcia<br>
              <strong>Recepção:</strong> Feast House
            </div>
          </div>

          <!-- corner roses -->
          <svg class="roses left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="roseGradL" cx="35%" cy="30%" r="75%">
                <stop offset="0%" stop-color="#b3283a"/>
                <stop offset="55%" stop-color="#8a1c28"/>
                <stop offset="100%" stop-color="#4a0c14"/>
              </radialGradient>
            </defs>
            <g stroke="#3d5836" stroke-width="3" fill="none" stroke-linecap="round">
              <path d="M60 190 Q40 140 70 100"/>
              <path d="M55 150 Q20 145 10 120"/>
              <path d="M75 120 Q100 100 95 70"/>
            </g>
            <g fill="#4b5842">
              <ellipse cx="18" cy="122" rx="14" ry="6" transform="rotate(-20 18 122)"/>
              <ellipse cx="96" cy="66" rx="12" ry="5" transform="rotate(30 96 66)"/>
            </g>
            <g>
              <circle cx="60" cy="150" r="30" fill="url(#roseGradL)"/>
              <path d="M60 130 a20 20 0 1 1 -19 26 a13 13 0 1 0 12 -19 a7 7 0 1 1 7 -7" fill="none" stroke="#e9c2ca" stroke-width="2" opacity="0.5"/>
              <circle cx="110" cy="175" r="20" fill="url(#roseGradL)"/>
              <circle cx="35" cy="185" r="16" fill="url(#roseGradL)"/>
            </g>
          </svg>

          <svg class="roses right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="roseGradR" cx="35%" cy="30%" r="75%">
                <stop offset="0%" stop-color="#b3283a"/>
                <stop offset="55%" stop-color="#8a1c28"/>
                <stop offset="100%" stop-color="#4a0c14"/>
              </radialGradient>
            </defs>
            <g stroke="#3d5836" stroke-width="3" fill="none" stroke-linecap="round">
              <path d="M60 190 Q40 140 70 100"/>
              <path d="M55 150 Q20 145 10 120"/>
              <path d="M75 120 Q100 100 95 70"/>
            </g>
            <g fill="#4b5842">
              <ellipse cx="18" cy="122" rx="14" ry="6" transform="rotate(-20 18 122)"/>
              <ellipse cx="96" cy="66" rx="12" ry="5" transform="rotate(30 96 66)"/>
            </g>
            <g>
              <circle cx="60" cy="150" r="30" fill="url(#roseGradR)"/>
              <path d="M60 130 a20 20 0 1 1 -19 26 a13 13 0 1 0 12 -19 a7 7 0 1 1 7 -7" fill="none" stroke="#e9c2ca" stroke-width="2" opacity="0.5"/>
              <circle cx="110" cy="175" r="20" fill="url(#roseGradR)"/>
              <circle cx="35" cy="185" r="16" fill="url(#roseGradR)"/>
            </g>
          </svg>

        </div>
      </div>
    </div>
  </div>

  <div class="hint">Toque no lacre para abrir</div>

</body>
</html>
