<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicole & Willamis | 03.07.2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f7f1ea;
    --paper:#faf5ef;
    --wine:#5e0f1c;
    --wine-2:#7a1a29;
    --wine-dark:#33070f;
    --wine-darker:#210409;
    --gold:#c8a15a;
    --gold-light:#e9d6ab;
    --rose-deep:#5c0f18;
    --rose-mid:#8a1c28;
    --rose-bright:#b3283a;
    --leaf:#4b5842;
    --ink:#4a2a2f;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
      radial-gradient(circle at 50% 20%, #fbf6f0 0%, var(--cream) 55%, #ece1d5 100%);
    font-family:'Cormorant Garamond', serif;
    overflow:hidden;
    position:relative;
  }

  /* soft ambient vignette */
  body::before{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(51,7,15,0.12) 100%);
    pointer-events:none;
  }

  .hint{
    position:absolute;
    bottom:34px;
    left:50%;
    transform:translateX(-50%);
    color:var(--wine-2);
    font-size:15px;
    letter-spacing:3px;
    text-transform:uppercase;
    font-family:'Cormorant Garamond', serif;
    opacity:0.55;
    animation:pulseHint 2.6s ease-in-out infinite;
  }
  @keyframes pulseHint{
    0%,100%{opacity:0.35;}
    50%{opacity:0.75;}
  }

  .scale-container{transform:scale(1);}

  .envelope-wrapper{
    position:relative;
    width:640px;
    height:430px;
  }

  #open-envelope{display:none;}

  /* ============ ENVELOPE ============ */
  .envelope{
    position:relative;
    width:100%;
    height:100%;
    border-radius:4px;
    background:
      linear-gradient(135deg, var(--wine-2) 0%, var(--wine) 45%, var(--wine-dark) 100%);
    box-shadow:
      0 45px 80px rgba(20,3,7,0.45),
      0 10px 25px rgba(20,3,7,0.3);
  }

  /* faint linen texture */
  .envelope::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 6px);
    border-radius:4px;
    pointer-events:none;
  }

  /* gold foil border frame */
  .foil-frame{
    position:absolute;
    inset:10px;
    border:1px solid var(--gold);
    border-radius:2px;
    opacity:0.55;
    z-index:2;
    pointer-events:none;
  }

  .front-left{
    position:absolute; inset:0;
    background:linear-gradient(120deg, var(--wine-dark), var(--wine));
    clip-path:polygon(0 0, 54% 50%, 0 100%);
    z-index:3;
  }
  .front-right{
    position:absolute; inset:0;
    background:linear-gradient(240deg, var(--wine-dark), var(--wine));
    clip-path:polygon(100% 0, 46% 50%, 100% 100%);
    z-index:3;
  }
  .front-bottom{
    position:absolute; inset:0;
    background:linear-gradient(0deg, var(--wine-darker), var(--wine-dark));
    clip-path:polygon(0 100%, 50% 46%, 100% 100%);
    z-index:3;
  }

  /* thin gold seams on the triangular folds */
  .seam{
    position:absolute; inset:0;
    z-index:4;
    pointer-events:none;
  }
  .seam svg{width:100%; height:100%;}

  .flap{
    position:absolute; inset:0;
    background:linear-gradient(160deg, var(--wine-2), var(--wine-dark));
    clip-path:polygon(0 0, 100% 0, 50% 54%);
    z-index:5;
    transform-origin:top;
    transition:transform 0.85s cubic-bezier(.4,0,.2,1);
    border-bottom:1px solid rgba(200,161,90,0.4);
  }
  .flap::after{
    content:"";
    position:absolute;
    inset:0;
    clip-path:polygon(0 0, 100% 0, 50% 54%);
    background:repeating-linear-gradient(100deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 7px);
  }

  /* light grey ribbon, ends gathered at the seal */
  .ribbon{
    position:absolute;
    top:0; bottom:0;
    left:50%;
    width:64px;
    margin-left:-32px;
    background:linear-gradient(to right, #c9c9c9, #f2f2f2 30%, #ffffff 50%, #f2f2f2 70%, #c9c9c9);
    box-shadow:3px 0 10px rgba(0,0,0,0.28), -3px 0 8px rgba(0,0,0,0.12);
    z-index:6;
    transition:opacity 0.4s, transform 0.4s;
  }
  .ribbon::before{
    content:"";
    position:absolute;
    left:0; right:0; top:50%;
    height:1px;
    background:rgba(0,0,0,0.06);
  }

  /* dried sprigs peeking from behind the seal, tucked with the ribbon ends */
  .sprig{
    position:absolute;
    top:50%; left:50%;
    width:130px; height:130px;
    margin:-65px 0 0 -65px;
    z-index:6;
    pointer-events:none;
    transition:opacity 0.4s, transform 0.4s;
  }
  .sprig.left{ transform:translateX(-38px) rotate(-14deg); }
  .sprig.right{ transform:translateX(38px) rotate(14deg) scaleX(-1); }

  .seal{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:100px; height:100px;
    border-radius:50%;
    background:radial-gradient(circle at 32% 28%, #8a2530, var(--rose-deep) 60%, #3b0e14 100%);
    z-index:7;
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--gold-light);
    font-family:'Parisienne', cursive;
    font-size:34px;
    cursor:pointer;
    box-shadow:
      0 10px 18px rgba(0,0,0,0.5),
      inset 0 0 10px rgba(255,255,255,0.15),
      inset 0 -6px 10px rgba(0,0,0,0.35);
    transition:opacity 0.4s, transform 0.4s;
  }
  .seal::before{
    content:"";
    position:absolute;
    inset:-6px;
    border-radius:50%;
    border:1px dashed rgba(233,214,171,0.5);
  }

  /* ============ CARD (interior) ============ */
  .card{
    position:absolute;
    width:560px;
    min-height:400px;
    top:14px;
    left:40px;
    z-index:1;
    background:var(--paper);
    border:1px solid var(--gold);
    outline:1px solid rgba(200,161,90,0.35);
    outline-offset:4px;
    border-radius:2px;
    box-shadow:0 30px 60px rgba(20,3,7,0.4);
    padding:52px 44px 40px;
    text-align:center;
    overflow:hidden;
    transition:transform 0.9s cubic-bezier(.4,0,.2,1), box-shadow 0.9s;
  }

  .card-bg{
    position:absolute;
    top:14px; left:50%;
    transform:translateX(-50%);
    width:440px;
    height:auto;
    opacity:0.16;
    z-index:0;
    pointer-events:none;
    mix-blend-mode:multiply;
    filter:sepia(1) saturate(4) hue-rotate(-40deg) brightness(0.75);
  }

  .card-content{position:relative; z-index:2;}

  .monogram{
    font-family:'Parisienne', cursive;
    font-size:40px;
    color:var(--gold);
    letter-spacing:2px;
    margin-bottom:6px;
    text-shadow:0 1px 0 rgba(255,255,255,0.6);
  }

  .cross{
    width:16px; height:22px;
    margin:0 auto 10px;
    opacity:0.8;
  }

  .names{
    font-family:'Parisienne', cursive;
    font-size:58px;
    color:var(--wine);
    margin:4px 0 18px;
    line-height:1.05;
  }

  .blessing{
    font-size:17px;
    color:var(--ink);
    font-style:italic;
    line-height:1.75;
    margin:0 auto 22px;
    max-width:380px;
    letter-spacing:0.3px;
  }
  .blessing span{display:block;}

  .icons-row{
    display:flex;
    justify-content:center;
    gap:26px;
    margin:6px 0 26px;
  }
  .icon-circle{
    width:52px; height:52px;
    border-radius:50%;
    background:radial-gradient(circle at 32% 28%, var(--rose-mid), var(--rose-deep));
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 6px 12px rgba(94,15,28,0.35), inset 0 -3px 6px rgba(0,0,0,0.25);
  }
  .icon-circle svg{width:22px; height:22px;}

  .divider{
    width:70px; height:1px;
    background:var(--gold);
    margin:0 auto 24px;
    opacity:0.7;
  }

  .date{
    font-family:'Parisienne', cursive;
    font-size:38px;
    color:var(--wine);
    margin-bottom:4px;
  }

  .time{
    font-size:19px;
    letter-spacing:4px;
    color:var(--ink);
    margin-bottom:20px;
  }

  .place{
    font-size:18px;
    color:var(--ink);
    line-height:2;
  }
  .place strong{
    color:var(--wine);
    font-weight:600;
  }

  .roses{
    position:absolute;
    bottom:-14px;
    width:150px;
    z-index:1;
    pointer-events:none;
  }
  .roses.left{ left:-24px; }
  .roses.right{ right:-24px; transform:scaleX(-1); }

  /* ============ open state ============ */
  #open-envelope:checked ~ .envelope .flap{
    transform:rotateX(180deg);
    z-index:1;
  }
  #open-envelope:checked ~ .envelope .ribbon{
    opacity:0;
    transform:translateY(-40px);
    pointer-events:none;
  }
  #open-envelope:checked ~ .envelope .sprig.left{
    opacity:0;
    transform:translateX(-38px) rotate(-14deg) translateY(-30px);
    pointer-events:none;
  }
  #open-envelope:checked ~ .envelope .sprig.right{
    opacity:0;
    transform:translateX(38px) rotate(14deg) scaleX(-1) translateY(-30px);
    pointer-events:none;
  }
  #open-envelope:checked ~ .envelope .seal{
    opacity:0;
    transform:translate(-50%,-90px) scale(0.9);
    pointer-events:none;
  }
  #open-envelope:checked ~ .envelope .card{
    transform:translateY(-330px) scale(1.03);
    box-shadow:0 55px 90px rgba(20,3,7,0.5);
  }

  /* ============ responsive ============ */
  @media (max-width:900px){
    .scale-container{transform:scale(0.72);}
  }
  @media (max-width:640px){
    .scale-container{transform:scale(0.5);}
  }
  @media (max-width:420px){
    .scale-container{transform:scale(0.4);}
  }
</style>
</head>
