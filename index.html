<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite - N & W</title>
    <style>
        body {
            background-color: #f0e9e4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        .envelope-wrapper {
            position: relative;
            width: 350px;
            height: 240px;
        }

        /* Esconde o controle do clique */
        #open-envelope {
            display: none;
        }

        /* Fundo do envelope (parte de dentro) */
        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #260c11; /* Interior bem escuro */
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        /* Cartão do convite */
        .card {
            position: absolute;
            background: #ffffff;
            width: 310px;
            height: 210px;
            top: 15px;
            left: 20px;
            z-index: 2; /* Fica atrás das abas da frente */
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            padding: 25px 20px;
            box-sizing: border-box;
            border: 1px solid #d4af37;
            border-radius: 2px;
        }

        .card h1 {
            color: #4a1d23;
            font-size: 28px;
            margin-bottom: 10px;
            font-style: italic;
            letter-spacing: 2px;
        }

        .card p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
            margin: 5px 0;
        }

        /* Abas frontais usando clip-path para recortes perfeitos */
        .front-left {
            position: absolute;
            inset: 0;
            background: #3e161c; 
            clip-path: polygon(0 0, 55% 50%, 0 100%);
            z-index: 3;
        }

        .front-right {
            position: absolute;
            inset: 0;
            background: #3e161c; 
            clip-path: polygon(100% 0, 45% 50%, 100% 100%);
            z-index: 3;
        }

        .front-bottom {
            position: absolute;
            inset: 0;
            background: #4a1d23; /* Marsala Principal */
            clip-path: polygon(0 100%, 50% 45%, 100% 100%);
            z-index: 3;
        }

        /* Aba superior (A que abre) */
        .flap {
            position: absolute;
            inset: 0;
            background: #5c242c; /* Marsala mais claro para dar contraste */
            clip-path: polygon(0 0, 100% 0, 50% 55%);
            z-index: 4;
            transform-origin: top;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Fita Cinza Claro */
        .ribbon {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 80px; /* Posição vertical à esquerda */
            width: 32px;
            background: linear-gradient(to right, #dcdcdc, #f5f5f5, #dcdcdc); /* Efeito de brilho na fita */
            z-index: 5;
            box-shadow: 2px 0 5px rgba(0,0,0,0.3), -1px 0 3px rgba(0,0,0,0.1);
            transition: opacity 0.4s, transform 0.4s;
        }

        /* Elemento decorativo das Flores Secas (SVG) */
        .flowers {
            position: absolute;
            top: 80px;
            left: 55px; /* Alinhado próximo à fita */
            width: 70px;
            height: 100px;
            z-index: 5;
            transition: opacity 0.4s, transform 0.4s;
            pointer-events: none;
        }

        .flowers svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.4));
        }

        /* Lacre de Cera */
        .seal {
            position: absolute;
            top: 130px;
            left: 96px; /* Centralizado exatamente em cima da fita */
            transform: translate(-50%, -50%);
            width: 65px;
            height: 65px;
            background: radial-gradient(circle at 30% 30%, #72222a, #3b0e14);
            border-radius: 50%;
            z-index: 6;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #d4af37;
            font-family: 'Georgia', serif;
            font-size: 20px;
            font-style: italic;
            cursor: pointer;
            box-shadow: 0 5px 8px rgba(0,0,0,0.5), inset 0 0 4px rgba(255,255,255,0.2);
            transition: opacity 0.4s, transform 0.4s;
        }

        /* AÇÕES DE ANIMAÇÃO AO CLICAR */
        
        /* 1. Abre a aba */
        #open-envelope:checked ~ .envelope .flap {
            transform: rotateX(180deg);
            z-index: 1; /* Vai para trás do cartão após abrir */
        }

        /* 2. Desfaz a fita, flores e o lacre suavemente */
        #open-envelope:checked ~ .envelope .ribbon,
        #open-envelope:checked ~ .envelope .flowers,
        #open-envelope:checked ~ .envelope .seal {
            opacity: 0;
            transform: translateY(-20px) scale(0.9); /* O lacre levanta e some */
            pointer-events: none;
        }

        /* 3. Desliza o cartão para fora */
        #open-envelope:checked ~ .envelope .card {
            transform: translateY(-130px);
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper">
        <input type="checkbox" id="open-envelope">
        
        <div class="envelope">
            <div class="front-left"></div>
            <div class="front-right"></div>
            <div class="front-bottom"></div>
            <div class="flap"></div>

            <!-- Fita e Flores -->
            <div class="ribbon"></div>
            
            <div class="flowers">
                <!-- Ramo botânico em SVG desenhado via código -->
                <svg viewBox="0 0 100 150" fill="none" stroke="#bda077" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M50,140 Q40,90 60,30" />
                    <path d="M54,105 Q70,95 80,75" />
                    <path d="M47,75 Q30,65 20,45" />
                    <path d="M57,55 Q75,45 85,25" />
                    <circle cx="80" cy="75" r="4" fill="#8c7353" stroke="none" />
                    <circle cx="20" cy="45" r="3.5" fill="#8c7353" stroke="none" />
                    <circle cx="85" cy="25" r="4" fill="#8c7353" stroke="none" />
                    <circle cx="60" cy="30" r="4.5" fill="#8c7353" stroke="none" />
                </svg>
            </div>

            <!-- Lacre clicável -->
            <label for="open-envelope" class="seal">N&W</label>
            
            <!-- Convite Interno -->
            <div class="card">
                <h1>N & W</h1>
                <p>Com a bênção de Deus e de seus pais, convidam para a celebração de seu casamento.</p>
                <p><strong>2027 | Aracaju - SE</strong></p>
                <p style="font-size: 10px; margin-top: 15px; color: #999;">(Toque no lacre novamente para fechar)</p>
            </div>
        </div>
    </div>

</body>
</html>
