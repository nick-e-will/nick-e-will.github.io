<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite - N & W</title>
    <style>
        body {
            background-color: #f0e9e4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        /* Container para escalar o convite dependendo da tela */
        .scale-container {
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        /* Envelope Gigante */
        .envelope-wrapper {
            position: relative;
            width: 800px;  /* Ampliado */
            height: 550px; /* Ampliado */
        }

        /* Esconde o controle do clique */
        #open-envelope {
            display: none;
        }

        /* Fundo do envelope */
        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #260c11;
            box-shadow: 0 35px 60px rgba(0,0,0,0.35);
            border-radius: 8px;
        }

        /* Cartão do convite */
        .card {
            position: absolute;
            background: #ffffff;
            width: 700px;  /* Papel interno gigante */
            height: 480px;
            top: 35px;
            left: 50px;
            z-index: 2;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            padding: 60px 40px;
            box-sizing: border-box;
            border: 2px solid #d4af37;
            border-radius: 4px;
        }

        .card h1 {
            color: #4a1d23;
            font-size: 65px; /* Fonte super legível */
            margin-bottom: 25px;
            font-style: italic;
            letter-spacing: 4px;
        }

        .card p {
            color: #555;
            font-size: 24px;
            line-height: 1.8;
            margin: 15px 0;
        }

        /* Abas frontais */
        .front-left {
            position: absolute;
            inset: 0;
            background: #3e161c; 
            clip-path: polygon(0 0, 55% 50%, 0 100%);
            z-index: 3;
        }

        .front-right {
            position: absolute;
            inset: 0;
            background: #3e161c; 
            clip-path: polygon(100% 0, 45% 50%, 100% 100%);
            z-index: 3;
        }

        .front-bottom {
            position: absolute;
            inset: 0;
            background: #4a1d23;
            clip-path: polygon(0 100%, 50% 45%, 100% 100%);
            z-index: 3;
        }

        /* Aba superior (que abre) */
        .flap {
            position: absolute;
            inset: 0;
            background: #5c242c;
            clip-path: polygon(0 0, 100% 0, 50% 55%);
            z-index: 4;
            transform-origin: top;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Fita Cinza Claro Centralizada */
        .ribbon {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -35px; /* Metade da largura para centralizar perfeito */
            width: 70px;
            background: linear-gradient(to right, #dcdcdc, #f5f5f5, #dcdcdc);
            z-index: 5;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3), -3px 0 8px rgba(0,0,0,0.1);
            transition: opacity 0.4s, transform 0.4s;
        }

        /* Flores Secas Centralizadas */
        .flowers {
            position: absolute;
            top: 170px;
            left: 50%;
            margin-left: -75px; /* Metade da largura para centralizar */
            width: 150px; 
            height: 220px;
            z-index: 5;
            transition: opacity 0.4s, transform 0.4s;
            pointer-events: none;
        }

        .flowers svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(2px 4px 5px rgba(0,0,0,0.4));
        }

        /* Lacre de Cera Centralizado */
        .seal {
            position: absolute;
            top: 302px; /* Alinhado ao bico da aba */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px; 
            height: 130px;
            background: radial-gradient(circle at 30% 30%, #72222a, #3b0e14);
            border-radius: 50%;
            z-index: 6;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #d4af37;
            font-family: 'Georgia', serif;
            font-size: 42px; 
            font-style: italic;
            cursor: pointer;
            box-shadow: 0 10px 15px rgba(0,0,0,0.5), inset 0 0 8px rgba(255,255,255,0.2);
            transition: opacity 0.4s, transform 0.4s;
        }

        /* === AÇÕES DE ANIMAÇÃO AO CLICAR === */
        
        #open-envelope:checked ~ .envelope .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* Animação da Fita e das Flores (Somem suavemente) */
        #open-envelope:checked ~ .envelope .ribbon,
        #open-envelope:checked ~ .envelope .flowers {
            opacity: 0;
            transform: translateY(-40px);
            pointer-events: none;
        }

        /* Animação do Lacre (Mantém o translate X de centralização ao subir) */
        #open-envelope:checked ~ .envelope .seal {
            opacity: 0;
            transform: translate(-50%, -90px) scale(0.9);
            pointer-events: none;
        }

        /* Desliza o cartão gigante para fora */
        #open-envelope:checked ~ .envelope .card {
            transform: translateY(-360px); 
        }

        /* === RESPONSIVIDADE PARA CELULARES === */
        @media (max-width: 900px) {
            .scale-container {
                transform: scale(0.8);
            }
        }
        @media (max-width: 700px) {
            .scale-container {
                transform: scale(0.45);
            }
        }
        @media (max-width: 400px) {
            .scale-container {
                transform: scale(0.38);
            }
        }
    </style>
</head>
<body>

    <div class="scale-container">
        <div class="envelope-wrapper">
            <input type="checkbox" id="open-envelope">
            
            <div class="envelope">
                <div class="front-left"></div>
                <div class="front-right"></div>
                <div class="front-bottom"></div>
                <div class="flap"></div>

                <!-- Fita Centralizada -->
                <div class="ribbon"></div>
                
                <!-- Flores Secas -->
                <div class="flowers">
                    <svg viewBox="0 0 100 150" fill="none" stroke="#bda077" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M50,140 Q40,90 60,30" />
                        <path d="M54,105 Q70,95 80,75" />
                        <path d="M47,75 Q30,65 20,45" />
                        <path d="M57,55 Q75,45 85,25" />
                        <circle cx="80" cy="75" r="4" fill="#8c7353" stroke="none" />
                        <circle cx="20" cy="45" r="3.5" fill="#8c7353" stroke="none" />
                        <circle cx="85" cy="25" r="4" fill="#8c7353" stroke="none" />
                        <circle cx="60" cy="30" r="4.5" fill="#8c7353" stroke="none" />
                    </svg>
                </div>

                <!-- Lacre Clicável -->
                <label for="open-envelope" class="seal">N&W</label>
                
                <!-- Convite Interno -->
                <div class="card">
                    <h1>N & W</h1>
                    <p>Com muita alegria, convidamos você para celebrar conosco o nosso casamento.</p>
                    <p><strong>2028 | Aracaju - SE</strong></p>
                    <p style="font-size: 16px; margin-top: 40px; color: #999;">(Toque no lacre novamente para fechar)</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
